<!DOCTYPE html>
<html>
	<head>
    	<meta charset = "utf-8">
        <meta viewport = "width = device-width">
    	<title>Метод Эйлера</title>
    </head>
<body>
	<script type = "text/javascript">
        let N;

        document.write("Введите N (x0..xN):<br>");
        let N_textbox = create_textbox("N", "N_textbox");
        document.write("<br>");
        let N_button = create_button("Ввод", "N_button");

        N_button.onclick = function(){
            N = Number(document.getElementById("N_textbox").value);

            print_equation();
            print_table(N);
            print_y0();
            
            let solve = create_button("Решение", "solve_button");
            document.write("<br>");
            solve_button.onclick = function(){
                print_Euler(get_table(N), get_y0());
            }
        }

        function print_y0(){
            document.write("Начальное условие:<br>y<sub>0</sub> = ");
            create_textbox("", "y0");
            document.write("<br>");
        }

        function print_table(N){
            document.write("Сетка:<br><table border = '1' cellspacing = '0'><tr>");
            for(let i = 0; i <= N; ++i){
                document.write("<td align = 'center'>x<sub>" + i + "</sub></td>");
            }
            document.write("</tr><tr>");
            for(let i = 0; i <= N; ++i){
                document.write("<td><input type = 'text' size = '4' id = 'x" + i + "'></td>");
            }
            document.write("</tr></table><br>");
        }

        function print_equation(){
            document.write("Пример ввода: y\' = 0.5x<sup>3</sup> + 2x<sup>2</sup>&times;y<sup>5</sup> + y<sup>0.5</sup><br>y\' = ");

            create_textbox("", "a");
            document.write("x^");
            create_textbox("", "deg_x");

            document.write(" + ");

            create_textbox("", "b");
            document.write("x^");
            create_textbox("", "deg_xx_y");
            document.write("*y^");
            create_textbox("", "deg_x_yy");
            
            document.write(" + ");

            create_textbox("", "c");
            document.write("y^");
            create_textbox("", "deg_y");
            document.write("<br>");
        }

        function print_Euler(x, y0){
            let N = x.length - 1;
            let y = y0;

            document.write("Сеточная функция:<br><table border = '1' cellspacing = '0'><tr>");
            for(let i = 0; i <= N; ++i){
                document.write("<td align = 'center'>y<sub>" + i + "</sub></td>");
            }
            document.write("</tr><tr><td align = 'center'>" + y0 + "</td>");
            for(let i = 1; i <= N; ++i){
                y += (x[i] - x[i - 1]) * f(x[i - 1], y);
                document.write("<td align = 'center'>" + y + "</td>");
            }
            document.write("</tr></table><br>");
        }

        function get_table(N){
            let x = new Array(N + 1);

            for(let i = 0; i <= N; ++i){
                x[i] = Number(document.getElementById("x" + i).value);
            }

            return x;
        }

        function get_y0(){
            return Number(document.getElementById("y0").value);
        }

        function f(x, y){
            let a = Number(document.getElementById("a").value);
            let deg_x = Number(document.getElementById("deg_x").value);
            let b = Number(document.getElementById("b").value);
            let deg_xx_y = Number(document.getElementById("deg_xx_y").value);
            let deg_x_yy = Number(document.getElementById("deg_x_yy").value);
            let c = Number(document.getElementById("c").value);
            let deg_y = Number(document.getElementById("deg_y").value);

            return a * Math.pow(x, deg_x) + b * Math.pow(x, deg_xx_y) * Math.pow(y, deg_x_yy) + c * Math.pow(y, deg_y);
        }

        function create_button(text, ident){
            let button = document.createElement("input");
            button.type = "button";
            
            button.value = text;
            button.id = ident;
            
            document.body.appendChild(button);
            return button;
        }
        
        function create_textbox(text, ident){
            let textbox = document.createElement("input");
            textbox.type = "text";
            textbox.size = 4;
            
            textbox.placeholder = text;
            textbox.id = ident;
            
            document.body.appendChild(textbox);
            return textbox;
        }
    </script>
</body>
</html>
