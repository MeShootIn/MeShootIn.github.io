<!DOCTYPE html>
<html>
    <head>
        <meta charset = "utf-8">
        <meta viewport = "width=device-width">
        <title>Метод Эйлера</title>
    </head>
<body>
    <script type = "text/javascript">
        // ИЗМЕНИТЬ ФУНКЦИЮ !!!!!!!!!!!!!!!!!!
        function f(x, y){
            return 6 * x*x + 5 * x * y;
        }

        var N = Number(prompt("Количество подотрезков N = ?", ""));
        var a, b, y_a;

        document.write("Отезок: ");
        let A = create_textbox("a", "a");
        let B = create_textbox("b", "b");

        document.write("<br>Начальное условие в точке x = a: ");
        let ya = create_textbox("y(a)", "y(a)");
        document.write("<br>");

        let euler_button = create_button("Вычислить", "euler_button");
        document.write("<br>");
        euler_button.onclick = function(){
            scan();

            Euler();
        };

        function Euler(){
            let h = (b - a) / N;
            let x = a;
            let y = y_a;

            document.write("i" + "&nbsp;&nbsp;&nbsp;&nbsp;" + "x" + "&nbsp;&nbsp;&nbsp;&nbsp;" + "y<br>0" + "&nbsp;&nbsp;" + x + "&nbsp;&nbsp;&nbsp;&nbsp;" + y + "<br>");
            for(let i = 1; i <= N; ++i){

                y += h * f(x, y); // вычисление yi
                x += h;
                document.write(i + "&nbsp;&nbsp;&nbsp;&nbsp;" + x + "&nbsp;&nbsp;&nbsp;&nbsp;" + y + "<br>");
            }
        }

        function scan(){
            a = Number(document.getElementById("a").value);
            b = Number(document.getElementById("b").value);
            y_a = Number(document.getElementById("y(a)").value);
        }

        function create_button(text, ident){
            let button = document.createElement("input");
            button.type = "button";
            
            button.value = text;
            button.id = ident;
            
            document.body.appendChild(button);
            return button;
        }
        
        function create_textbox(text, ident){
            let textbox = document.createElement("input");
            textbox.type = "text";
            textbox.size = 4;
            
            textbox.placeholder = text;
            textbox.id = ident;
            
            document.body.appendChild(textbox);
            return textbox;
        } 
    </script>
</body>
</html>
