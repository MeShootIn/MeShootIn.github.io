<!DOCTYPE html>
<html>
	<head>
    	<meta charset = "utf-8">
    	<title>Tridiagonal matrix algorithm</title>
    </head>
<body>
	<script type = "text/javascript">
        let N = Number(prompt("N = ?", ""));
        //var N = 4;
        SPACES = 15;
        
        // матрица
        for(let i = 0; i < N; ++i){
        	for(let j = 0; j < 3; ++j){
            	// первую ячейку не печатать (a[0] = 0)
            	if(i == 0 && j == 0){
                	continue;
                }
                
                // пробелы в начале строки
                if(i > 1 && j == 0){
                	for(var space = 0; space < i - 1; ++space){
                    	spaces(SPACES);
                	}
                }
                
                // последнюю ячейку не печатать (c[N - 1] = 0)
                if(i == N - 1 && j == 2){
                	continue;
                }
                
                // собственно ячейка
                let txt = String.fromCharCode("a".charCodeAt(0) + j) + i;
                let textbox = create_textbox(txt, txt);
            }
            
            // пробелы перед d[i]
            spaces(SPACES);
            for(let space = 0; space < N - i - 2; ++space){
            	spaces(SPACES);
            }
            
            let textbox = create_textbox("d" + i, "d" + i);
            
            document.write("<br>");
        }
        
        var a = new Array(N);
        a[0] = 0;
        for(let i = 1; i < N; ++i){
            a[i] = document.getElementById("a" + i).value;
        }
        
        var b = new Array(N);
        for(let i = 0; i < N; ++i){
            b[i] = document.getElementById("b" + i).value;
        }
        
        var c = new Array(N);
        c[N - 1] = 0;
        for(let i = 0; i < N - 1; ++i){
            c[i] = document.getElementById("c" + i).value;
        }
        
        var d = new Array(N);
        for(let i = 0; i < N; ++i){
        	d[i] = document.getElementById("d" + i).value;
        }
        
        /*a = [0, 1, 1, 1];
        b = [2, 10, -5, 4];
        c = [1, -5, 2, 0];
        d = [-5, -18, -40, -27];
        // x = [-3, 1, 5, -8]
        print(a, b, c, d);*/
        
        function spaces(count){
        	for(let len = 0; len < count; ++len){
            	document.write("&nbsp;");
            }
        }
        
        function create_button(text, func){
        	let button = document.createElement("input");
    		button.type = "button";
            
    		button.value = text;
    		button.onclick = func;
            
    		context.appendChild(button);
            return button;
		}
        
        function create_textbox(text, ident){
        	let textbox = document.createElement("input");
            textbox.type = "text";
			textbox.size = 4;
            
            textbox.placeholder = text;
			textbox.id = ident;
            
			document.body.appendChild(textbox);
            return textbox;
        }
        
    	function TDMA(a, b, c, d){
        	let N = a.length;
            
            let alpha = new Array(N);
            let beta = new Array(N);
            let x = new Array(N);
            
            for(let i = 0; i < N; ++i){
            	alpha[i] = beta[i] = x[i] = 0;
            }
            
            for(let i = 1; i < N; ++i){
            	alpha[i] = -c[i - 1] / (a[i - 1] * alpha[i - 1] + b[i - 1]);
                beta[i] = (d[i - 1] - a[i - 1] * beta[i - 1]) / (a[i - 1] * alpha[i - 1] + b[i - 1]);
            }
             
            x[N - 1] = (d[N - 1] - a[N - 1] * beta[N - 1]) / (b[N - 1] + a[N - 1] * alpha[N - 1]);
            for(let i = N - 2; i >= 0; --i){
            	x[i] = alpha[i + 1] * x[i + 1] + beta[i + 1];
            }
            
            for(let i = 0; i < N; ++i){
            	document.write(x[i] + "<br>")
            }
        }
        
        function print(a, b, c, d){
        	document.write("a[]: ", a);
            document.write("<br>");
            
            document.write("b[]: ", b);
            document.write("<br>");
            
            document.write("c[]: ", c);
            document.write("<br>");
            
            document.write("d[]: ", d);
            document.write("<br>");
        }
    </script>
    <input type = "button" onclick = "TDMA(a, b, c, d)" value = "GO">
    <input type = "button" onclick = "print(a, b, c, d)" value = "pechat">
</body>
</html>
