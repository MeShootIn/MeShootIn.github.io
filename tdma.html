<!DOCTYPE html>
<html>
	<head>
        <title>Метод прогонки</title>

    	<meta charset = "utf-8">
        <meta name = "description" content = "Решение трёхдиагональной СЛАУ методом прогонки онлайн">
        <meta name = "keywords" content = "метод прогонки, метод, прогонки, трёхдиагональная, слау, калькулятор, онлайн, решение">
        <meta http-equiv = "X-UA-Compatible" content = "IE = edge">
        <meta name = "viewport" content = "width = device-width, initial-scale = 1">
    </head>
<body>
	<script type = "text/javascript">
        /*let N = 4;
        let a = [0, 1, 1, 1];
        let b = [2, 10, -5, 4];
        let c = [1, -5, 2, 0];
        let d = [-5, -18, -40, -27];
        ответ -3 1 5 -8*/

        document.write("Количество уравнений n:<br><input type = 'text' size = '4' id = 'N'><br>Вид дробей:<br>");
        document.write("<input type = 'radio' name = 'fraction'>Обыкновенные<br>");
        document.write("<input type = 'radio' name = 'fraction'>Десятичные<br>");
        
        let go_button = create_button("Ввод", "go_button");
        go_button.onclick = function(){
            let N = Number(document.getElementById("N").value);

            let a = new Array(N);
            let b = new Array(N);
            let c = new Array(N);
            let d = new Array(N);

            // Обыкновенные дроби
            if(document.getElementsByName("fraction")[0].checked){
                print_tridiagonal_matrix_fractions(N);

                let solve_button = create_button("Решение", "solve_button");
                solve_button.onclick = function(){
                    a[0] = new Fraction(0, 1);
                    for(let i = 1; i < N; ++i){
                        a[i] = new Fraction(Number(document.getElementById("a" + i + "num").value), Number(document.getElementById("a" + i + "den").value));
                    }
                    
                    for(let i = 0; i < N; ++i){
                        b[i] = new Fraction(Number(document.getElementById("b" + i + "num").value), Number(document.getElementById("b" + i + "den").value));
                    }
                    
                    c[N - 1] = new Fraction(0, 1);
                    for(let i = 0; i < N - 1; ++i){
                        c[i] = new Fraction(Number(document.getElementById("c" + i + "num").value), Number(document.getElementById("c" + i + "den").value));
                    }
                    
                    for(let i = 0; i < N; ++i){
                        d[i] = new Fraction(Number(document.getElementById("d" + i + "num").value), Number(document.getElementById("d" + i + "den").value));
                    }

                    TDMA(a, b, c, d);
                }
            }
            // Десятичные дроби
            else{
                print_tridiagonal_matrix(N);

                let solve_button = create_button("Решение", "solve_button");
                solve_button.onclick = function(){
                    a[0] = new Fraction(0, 1);
                    for(let i = 1; i < N; ++i){
                        a[i]= new Fraction(Number(document.getElementById("a" + i).value), 1);
                    }
                    
                    for(let i = 0; i < N; ++i){
                        b[i] = new Fraction(Number(document.getElementById("b" + i).value), 1);
                    }
                    
                    c[N - 1] = new Fraction(0, 1);
                    for(let i = 0; i < N - 1; ++i){
                        c[i] = new Fraction(Number(document.getElementById("c" + i).value), 1);
                    }
                    
                    for(let i = 0; i < N; ++i){
                        d[i] = new Fraction(Number(document.getElementById("d" + i).value), 1);
                    }

                    TDMA(a, b, c, d);
                }
            }            
        }

        function print_tridiagonal_matrix_fractions(N){
            document.write("<style type = 'text/css'>input:disabled{border: solid 1px white;background-color: white;}</style><table>");

            for(let i = 0; i < N; ++i){
                document.write("<tr>");
                for(let j = 0; j < i - 1; ++j){
                    document.write("<td align = 'center'>0</td>");
                }
                for(let j = 0; j < 3; ++j){
                    if((i == 0 && j == 0) || (i == N - 1 && j == 2)){
                        continue;
                    }
                    let txt = String.fromCharCode("a".charCodeAt(0) + j) + i;
                    document.write("<td><input type = 'text' placeholder = '" + txt + "' size = '1' id = '" + txt + "num'><br><input type = 'text' size = '1' id = '" + txt + "den'></td>");
                }
                for(let j = 0; j < N - i - 2; ++j){
                    document.write("<td align = 'center'>0</td>");
                }

                let txt = "d" + i;
                document.write("<td><input size = '1' disabled><br><input size = '1' disabled></td><td><input type = 'text' placeholder = '" + txt + "' size = '1' id = '" + txt + "num'><br><input type = 'text' size = '1' id = '" + txt + "den'></td>");
                document.write("</tr>");
            }

            document.write("</table>");
        }

        function print_tridiagonal_matrix(N){
            document.write("<style type = 'text/css'>input:disabled{border: solid 1px white;background-color: white;}</style><table>");

            for(let i = 0; i < N; ++i){
                document.write("<tr>");
                for(let j = 0; j < i - 1; ++j){
                    document.write("<td align = 'center'>0</td>");
                }
                for(let j = 0; j < 3; ++j){
                    if((i == 0 && j == 0) || (i == N - 1 && j == 2)){
                        continue;
                    }
                    let txt = String.fromCharCode("a".charCodeAt(0) + j) + i;
                    document.write("<td><input type = 'text' placeholder = '" + txt + "' size = '4' id = '" + txt + "'></td>");
                }
                for(let j = 0; j < N - i - 2; ++j){
                    document.write("<td align = 'center'>0</td>");
                }

                let txt = "d" + i;
                document.write("<td><input size = '4' disabled></td><td><input type = 'text' placeholder = '" + txt + "' size = '4' id = '" + txt + "'></td>");
                document.write("</tr>");
            }

            document.write("</table>");
        }
        
        function create_button(text, ident){
            let button = document.createElement("input");
            button.type = "button";
            
            button.value = text;
            button.id = ident;
            
            document.body.appendChild(button);
            return button;
        }
        
        function create_textbox(text, ident){
            let textbox = document.createElement("input");
            textbox.type = "text";
            textbox.size = 4;
            
            textbox.placeholder = text;
            textbox.id = ident;
            
            document.body.appendChild(textbox);
            return textbox;
        }

    	function TDMA(a, b, c, d){
            document.write("<br><strong>Расчётные формулы:</strong><br>");
            document.write("&alpha;<sub>0</sub> = &alpha;<sub>n</sub> = &beta;<sub>0</sub> = 0<br>");
            document.write("&alpha;<sub>i</sub> = (-c<sub>i - 1</sub>) / (a<sub>i - 1</sub>&times;&alpha;<sub>i - 1</sub> + b<sub>i - 1</sub>) (&forall;i = 1 &divide; n)<br>");
            document.write("&beta;<sub>i</sub> = (d<sub>i - 1</sub> - a<sub>i - 1</sub>&times;&beta;<sub>i - 1</sub>) / (a<sub>i - 1</sub>&times;&alpha;<sub>i - 1</sub> + b<sub>i - 1</sub>) (&forall;i = 1 &divide; n)<br>");
            document.write("x<sub>i</sub> = &alpha;<sub>i + 1</sub>&times;x<sub>i + 1</sub> + &beta;<sub>i + 1</sub> (&forall;i = n - 1 &divide; 0)<br><strong>Решение:</strong><br>");

            let N = a.length;
            let alpha = new Array(N + 1);
            let beta = new Array(N + 1);
            let x = new Array(N);
            
            for(let i = 0; i <= N; ++i){
            	alpha[i] = new Fraction(0, 1);
                beta[i] = new Fraction(0, 1);
                x[i] = new Fraction(0, 1);
            }
            
            for(let i = 1; i <= N; ++i){
            	if(i != N){
                    alpha[i] = div(mult(c[i - 1], new Fraction(-1, 1)), sum(mult(a[i - 1], alpha[i - 1]), b[i - 1]));
                    alpha[i].reduce();
                }
                beta[i] = div(sub(d[i - 1], mult(a[i - 1], beta[i - 1])), sum(mult(a[i - 1], alpha[i - 1]), b[i - 1]));
                beta[i].reduce();

                // сделать знаменатель только натуральным!!!!!
                document.write("&alpha;<sub>" + i + "</sub> = ");
                print_fraction(alpha[i]);

                document.write("; &beta;<sub>" + i + "</sub> = ");
                print_fraction(beta[i]);
                document.write(";<br>");
            }

            for(let i = N - 1; i >= 0; --i){
            	x[i] = sum(mult(alpha[i + 1], x[i + 1]), beta[i + 1]);
                x[i].reduce();

                document.write("x<sub>" + i + "</sub> = ");
                print_fraction(x[i]);
                document.write(";<br>");
            }
        }

        function print_fraction(A){
            if(A.den != 1){
                document.write(A.num + "/" + A.den + " = ");
            }
            document.write(A.value());
        }



        // Класс дробей
        class Fraction{
            constructor(a, b){
                this.num = a;
                this.den = b;
            }

            reduce(){
                let k = gcd(this.num, this.den);

                this.num /= k;
                this.den /= k;

                if(this.den < 0){
                    this.num *= -1;
                    this.den *= -1;
                }
                
                return this;
            }

            value(){
                return this.num / this.den;
            }
        }

        function sum(A, B){
            return new Fraction(A.num * B.den + A.den * B.num, A.den * B.den);
        }

        function sub(A, B){
            B.num *= -1;

            return sum(A, B);
        }

        function mult(A, B){
            return new Fraction(A.num * B.num, A.den * B.den);
        }

        function div(A, B){
            B.den = [B.num, B.num = B.den][0];

            return mult(A, B);
        }

        function gcd(a, b){
            while(b != 0){
                a %= b;
                b = [a, a = b][0];
            }

            return a;
        }
    </script>
</body>
</html>
