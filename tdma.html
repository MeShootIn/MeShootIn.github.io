    	function TDMA_fractions(a, b, c, d){

        function TDMA(a, b, c, d){
            print_formulas();

            let N = a.length;
            let alpha = new Array(N + 1);
            let beta = new Array(N + 1);
            let x = new Array(N + 1);

            for(i = 0; i <= N; ++i){
                alpha[i] = beta[i] = x[i] = 0;
            }
            
            for(i = 1; i <= N; ++i){
                if(i != N){
                    alpha[i] = -c[i - 1] / (a[i - 1] * alpha[i - 1] + b[i - 1]);
                }
                print("&alpha;<sub>" + i + "</sub> = " + alpha[i]);

                beta[i] = (d[i - 1] - a[i - 1] * beta[i - 1]) / (a[i - 1] * alpha[i - 1] + b[i - 1]);
                print("; &beta;<sub>" + i + "</sub> = " + beta[i] + "<br>");
            }

            for(i = N - 1; i >= 0; --i){
                x[i] = alpha[i + 1] * x[i + 1] + beta[i + 1];
                print("x<sub>" + i + "</sub> = " + x[i] + "<br>");
            }
        }

        // Класс дробей
        class Fraction{
            constructor(a, b){
                this.num = a;
                this.den = b;
            }

            reduce(){
                if(this.num != 0){
                    let k = gcd(this.num, this.den);

                    this.num /= k;
                    this.den /= k;

                    if(this.den < 0){
                        this.num *= -1;
                        this.den *= -1;
                    }
                }
                
                return this;
            }

            value(){
                return this.num / this.den;
            }
        }

        function sum(A, B){
            return new Fraction(A.num * B.den + A.den * B.num, A.den * B.den);
        }

        function sub(A, B){
            B.num *= -1;

            return sum(A, B);
        }

        function mult(A, B){
            return new Fraction(A.num * B.num, A.den * B.den);
        }

        function div(A, B){
            B.den = [B.num, B.num = B.den][0];

            return mult(A, B);
        }

        function gcd(a, b){
            while(b != 0){
                a %= b;
                b = [a, a = b][0];
            }

            return a;
        }
