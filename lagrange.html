<!DOCTYPE html>
<html>
	<head>
    	<meta charset = "utf-8">
    	<title>Интерполяционный многочлен Лагранжа</title>
    </head>
<body>
	<script type = "text/javascript">
        var N = Number(prompt("N = ?", ""));

        var x = new Array(N + 1);
		var y = new Array(N + 1);
		let a = [];

        for(let i = 0; i <= N; ++i){
        	create_textbox("x" + i, "x" + i);
        }
        document.write("<br>");
        for(let i = 0; i <= N; ++i){
        	create_textbox("y" + i, "y" + i);
        }
        document.write("<br>");

        let coeffs = create_button("коэффициенты", "coeffs_button");
        document.write("<br>");
        coeffs.onclick = function(){
        	scan();

        	a = get_coefficients(x, y);

        	for(let i = 0; i <= N; ++i){
        		document.write(a[i] + " ");
        	}
        	document.write("<br>");
  		};

  		let point_textbox = create_textbox("x", "point");
  		document.write("<br>");
  		let get_value = create_button("значение в точке", "value_button");
  		get_value.onclick = function(){
  			scan();
  			document.write(P(Number(point_textbox.value), x, y));
  		}

        function P(x0, x, y){
		    //let N = x.length;
		    let S = 0;
		   
		    for(let i = 0; i <= N; ++i){
		        let L = 1;
		       
		        for(let j = 0; j <= N; ++j){
		            if(i != j){
		                L *= (x0 - x[j]) / (x[i] - x[j]);
		            }
		        }
		       
		        S += y[i] * L;
		    }
		   
		    return S;
		}

		function get_coefficients(x, y){
		    //let N = x.length;
		    let a = new Array(N + 1);
		   
		    for(let i = 0; i <= N; ++i){
		        a[i] = y[i];
		        for(let j = 0; j <= N; ++j){
		            if(i != j){
		                a[i] /= x[i] - x[j];
		            }
		        }
		    }

		    return a;
		}

		function scan(){
			for(let i = 0; i <= N; ++i){
        		x[i] = document.getElementById("x" + i).value;
        		y[i] = document.getElementById("y" + i).value;
        	}
		}

        function create_button(text, ident){
        	let button = document.createElement("input");
    		button.type = "button";
            
    		button.value = text;
    		//button.onclick = func;
            
            document.body.appendChild(button);
            return button;
		}
        
        function create_textbox(text, ident){
        	let textbox = document.createElement("input");
            textbox.type = "text";
			textbox.size = 4;
            
            textbox.placeholder = text;
			textbox.id = ident;
            
			document.body.appendChild(textbox);
            return textbox;
        } 
    </script>
    <!---button onclick = "print_coefficients(x, y)">Коэффициенты</button--->
</body>
</html>
